<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Golden Beach Guest House | Staff Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="css/responsive.css">  <link rel="stylesheet" href="css/login-staff.css">
  </head>
<body>

  <!-- 🎥 Vídeos de fundo -->
  <video class="bg-video active" autoplay muted loop>
    <source src="video/Hotel_vid1.mp4" type="video/mp4">
  </video>

  <video class="bg-video" autoplay muted loop>
    <source src="video/Hotel_vid2.mp4" type="video/mp4">
  </video>

  <video class="bg-video" autoplay muted loop>
    <source src="video/Hotel_vid3.mp4" type="video/mp4">
  </video>

  <!-- 🧊 Conteúdo -->
  <div class="overlay">
    <div class="card">
      <div class="card-header">
        <img src="img/logo.png" alt="Logo">
        <h1>Staff Login</h1>
        <p>Golden Beach Guest House</p>
      </div>

      <div class="error" id="errorMsg"></div>
      <div class="success" id="successMsg"></div>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required placeholder="staff@example.com">

        <label>Palavra-passe</label>
        <input type="password" id="password" required placeholder="••••••••">

        <button type="submit" id="loginBtn">Entrar</button>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>A autenticar...</p>
        </div>
      </form>

      <div class="back-link">
        <a href="home.html">← Voltar ao Home</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const loading = document.getElementById("loading");

    // Rotação de vídeos
    const videos = document.querySelectorAll(".bg-video");
    let videoAtual = 0;

    videos.forEach(video => {
      video.playbackRate = 0.5;
    });

    setInterval(() => {
      videos[videoAtual].classList.remove("active");
      videoAtual = (videoAtual + 1) % videos.length;
      videos[videoAtual].classList.add("active");
    }, 10000);

    // Login
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorMsg.style.display = "none";
      successMsg.style.display = "none";
      loading.style.display = "block";
      loginBtn.disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(
          auth,
          emailInput.value,
          passwordInput.value
        );

        successMsg.textContent = "✅ Login realizado com sucesso!";
        successMsg.style.display = "block";

        // Guardar token e redirecionar
        setTimeout(() => {
          localStorage.setItem("staffLoggedIn", "true");
          localStorage.setItem("userEmail", userCredential.user.email);
          window.location.href = "staff.html";
        }, 1500);

      } catch (error) {
        let mensagem = "❌ Erro ao fazer login";

        if (error.code === "auth/user-not-found") {
          mensagem = "❌ Utilizador não encontrado";
        } else if (error.code === "auth/wrong-password") {
          mensagem = "❌ Palavra-passe incorreta";
        } else if (error.code === "auth/invalid-email") {
          mensagem = "❌ Email inválido";
        }

        errorMsg.textContent = mensagem;
        errorMsg.style.display = "block";
        loading.style.display = "none";
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
