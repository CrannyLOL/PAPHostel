<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta | Golden Beach Guest House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
<link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/register.css">
  </head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-left">
      <img src="img/logo.png" alt="Logo" class="navbar-logo">
      <h2>GOLDEN BEACH GUESTHOUSE</h2>
    </div>
    <div class="navbar-right">
      <div class="language-selector">
        <span data-i18n="lang-label">Selecionar Idioma</span>
        <div class="language-buttons">
          <button class="language-toggle" id="langBtnPt" title="Português">
            <img src="img/Pt.png" alt="Português">
          </button>
          <button class="language-toggle" id="langBtnEn" title="English">
            <img src="img/Uk.png" alt="English">
          </button>
        </div>
      </div>
      <a href="index.html" data-i18n="navbar-home">Home</a>
    </div>
  </div>

  <!-- Login Links -->
  <div class="login-links">
    <a href="login-staff.html">STAFF</a>
    <a href="login-admin.html">ADMIN</a>
  </div>

  <!-- Register Container -->
  <div class="register-container">
    <div class="register-card">
      <div class="logo-container">
        <img src="img/logo.png" alt="Golden Beach Guest House" class="logo">
      </div>

      <h1 data-i18n="register-title">Criar Conta</h1>
      <p data-i18n="register-subtitle">Junte-se a nós e desfrute de benefícios exclusivos</p>

      <div id="message" class="message"></div>

      <form id="registerForm">
        <div class="two-columns">
          <div class="form-group">
            <label for="firstName" data-i18n="register-firstname">Nome *</label>
            <input type="text" id="firstName" name="firstName" required placeholder="">
          </div>

          <div class="form-group">
            <label for="lastName" data-i18n="register-lastname">Sobrenome *</label>
            <input type="text" id="lastName" name="lastName" required placeholder="">
          </div>
        </div>

        <div class="form-group">
          <label for="email" data-i18n="register-email">Email *</label>
          <input type="email" id="email" name="email" required placeholder="">
        </div>

        <div class="two-columns">
          <div class="form-group">
            <label for="phone" data-i18n="register-phone">Telefone</label>
            <input type="tel" id="phone" name="phone" placeholder="">
          </div>

          <div class="form-group">
            <label for="cc" data-i18n="register-cc">Cartão de Cidadão *</label>
            <input type="text" id="cc" name="cc" required placeholder="">
          </div>
        </div>

        <div class="form-group">
          <label for="nationality" data-i18n="register-nationality">Nacionalidade</label>
          <select id="nationality" name="nationality">
            <option value="">Selecione...</option>
            <option value="PT">Portugal</option>
            <option value="ES">Espanha</option>
            <option value="FR">França</option>
            <option value="DE">Alemanha</option>
            <option value="IT">Itália</option>
            <option value="GB">Reino Unido</option>
            <option value="BR">Brasil</option>
            <option value="US">Estados Unidos</option>
            <option value="Other">Outro</option>
          </select>
        </div>

<div class="form-group">
          <label for="password" data-i18n="register-password">Palavra-passe *</label>
          <div class="password-container">
            <input type="password" id="password" name="password" required placeholder="">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', event)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" data-i18n="register-confirm-password">Confirmar Palavra-passe *</label>
          <div class="password-container">
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword', event)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-register" data-i18n="register-btn">Criar Conta</button>
      </form>

      <div class="terms" data-i18n="register-terms">
        Ao registar-se, concorda com os nossos <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>
      </div>

      <div class="login-link">
        <span data-i18n="register-have-account">Já tem conta? </span>
        <a href="index.html" data-i18n="register-login-link">Fazer Login</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
